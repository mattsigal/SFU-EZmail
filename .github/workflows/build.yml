name: Build SFU-EZmail

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter pandas openpyxl

    - name: Get CustomTkinter Path
      id: ctk-path
      shell: bash
      run: |
        CTK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
        echo "path=$CTK_PATH" >> $GITHUB_OUTPUT

    - name: Build SFU-EZmail (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m PyInstaller --noconsole --onefile --clean --name SFU-EZmail --add-data "${{ steps.ctk-path.outputs.path }};customtkinter/" scripts/grade_applet.py

    - name: Build SFU-EZmail (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        python -m PyInstaller --noconsole --onefile --clean --name SFU-EZmail --add-data "${{ steps.ctk-path.outputs.path }}:customtkinter/" scripts/grade_applet.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SFU-EZmail-${{ matrix.os }}
        path: |
          dist/SFU-EZmail.exe
          dist/SFU-EZmail.app
          dist/SFU-EZmail

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          SFU-EZmail.exe
          SFU-EZmail.app
          SFU-EZmail
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
